# Golden CI floor — see dotfiles/templates/ci/README.md.
# vitareba: pnpm + vitest. 55 test files / ~798 cases that, until now, never ran
# on the shared branch. This gate runs them on every push & PR to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: pnpm run build
